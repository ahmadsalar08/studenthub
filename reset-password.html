<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentHub — Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="login-body">

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-dot"></div>
        StudentHub
      </a>
    </div>
  </nav>

  <div class="login-wrap" style="justify-content:center">
    <div class="login-right" style="max-width:460px;width:100%">
      <div class="form-card">

        <div id="reset-panel">
          <div class="form-header">
            <h1 class="form-title">Naya password set karo 🔑</h1>
            <p class="form-subtitle">Apna naya password daalo</p>
          </div>

          <div class="form-group">
            <label class="form-label">Naya password</label>
            <div class="input-wrap">
              <i class="ti ti-lock input-icon"></i>
              <input type="password" class="form-input" id="new-password" placeholder="••••••••" oninput="checkStrength(this.value)">
              <button class="eye-btn" onclick="togglePass('new-password', this)">
                <i class="ti ti-eye"></i>
              </button>
            </div>
            <div class="strength-wrap" id="strength-wrap">
              <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
              </div>
              <span class="strength-label" id="strength-label"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="input-wrap">
              <i class="ti ti-lock input-icon"></i>
              <input type="password" class="form-input" id="confirm-password" placeholder="••••••••">
              <button class="eye-btn" onclick="togglePass('confirm-password', this)">
                <i class="ti ti-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-error" id="reset-error"></div>

          <button class="submit-btn" onclick="handleReset()">
            <span>Password update karo</span>
            <i class="ti ti-arrow-right"></i>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient(
      'https://bafpnqleaivhlbtbvufg.supabase.co',
      'sb_publishable_dyg3P9bHZkwRn7_bErLySw_lGPgdGfc'
    )

    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector("i");
      input.type = input.type === "password" ? "text" : "password";
      icon.className = input.type === "password" ? "ti ti-eye" : "ti ti-eye-off";
    }
    window.togglePass = togglePass;

    function checkStrength(val) {
      const fill = document.getElementById("strength-fill");
      const label = document.getElementById("strength-label");
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: "0%", bg: "transparent", text: "" },
        { w: "25%", bg: "#ef4444", text: "Weak" },
        { w: "50%", bg: "#f97316", text: "Fair" },
        { w: "75%", bg: "#eab308", text: "Good" },
        { w: "100%", bg: "#22c55e", text: "Strong" },
      ];
      const level = val.length === 0 ? levels[0] : levels[score] || levels[1];
      fill.style.width = level.w;
      fill.style.background = level.bg;
      label.textContent = level.text;
      label.style.color = level.bg;
    }
    window.checkStrength = checkStrength;

    async function handleReset() {
      const password = document.getElementById("new-password").value;
      const confirm  = document.getElementById("confirm-password").value;
      const errorEl  = document.getElementById("reset-error");
      errorEl.innerHTML = "";

      if (!password || password.length < 6) {
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> Password kam se kam 6 characters ka hona chahiye';
        return;
      }
      if (password !== confirm) {
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> Dono passwords match nahi kar rahe';
        return;
      }

      const btn = document.querySelector(".submit-btn");
      btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Update ho raha hai...';
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        btn.innerHTML = '<span>Password update karo</span> <i class="ti ti-arrow-right"></i>';
        btn.disabled = false;
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> ' + error.message;
        return;
      }

      document.getElementById("reset-panel").innerHTML = `
        <div class="success-state">
          <div class="success-icon"><i class="ti ti-check"></i></div>
          <h2 class="success-title">Password update ho gaya! ✅</h2>
          <p class="success-sub">Ab naye password se sign in kar sakte ho.</p>
          <a href="login.html" class="submit-btn" style="text-decoration:none;justify-content:center;display:flex">
            Sign in karo <i class="ti ti-arrow-right"></i>
          </a>
        </div>
      `;
    }
    window.handleReset = handleReset;
  </script>
</body>
</html>
