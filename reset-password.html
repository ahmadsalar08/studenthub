<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0D0D0D">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentHub — Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- OG / Social Meta Tags -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="StudentHub">
  <meta property="og:title"       content="Reset Password — StudentHub">
  <meta property="og:description" content="Reset your StudentHub account password.">
  <meta property="og:url"         content="https://studenthub-plum.vercel.app/reset-password.html">
  <meta property="og:image"       content="https://studenthub-plum.vercel.app/android-chrome-512x512.png">
  <meta property="og:image:width"  content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Reset Password — StudentHub">
  <meta name="twitter:description" content="Reset your StudentHub account password.">
  <meta name="twitter:image"       content="https://studenthub-plum.vercel.app/android-chrome-512x512.png">
  <!-- Description for search engines -->
  <meta name="description"         content="Reset your StudentHub account password.">
</head>
<body class="login-body">

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-dot"></div>
        StudentHub
      </a>
    </div>
  </nav>

  <div class="login-wrap" style="justify-content:center">
    <div class="login-right" style="max-width:460px;width:100%">
      <div class="form-card">

        <div id="reset-panel">
          <div class="form-header">
            <h1 class="form-title">Set a new password 🔑</h1>
            <p class="form-subtitle">Enter your new password below</p>
          </div>

          <div class="form-group">
            <label class="form-label">New password</label>
            <div class="input-wrap">
              <i class="ti ti-lock input-icon"></i>
              <input type="password" class="form-input" id="new-password" placeholder="••••••••" oninput="checkStrength(this.value)">
              <button class="eye-btn" onclick="togglePass('new-password', this)">
                <i class="ti ti-eye"></i>
              </button>
            </div>
            <div class="strength-wrap" id="strength-wrap">
              <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
              </div>
              <span class="strength-label" id="strength-label"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="input-wrap">
              <i class="ti ti-lock input-icon"></i>
              <input type="password" class="form-input" id="confirm-password" placeholder="••••••••">
              <button class="eye-btn" onclick="togglePass('confirm-password', this)">
                <i class="ti ti-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-error" id="reset-error"></div>

          <button class="submit-btn" onclick="handleReset()">
            <span>Update password</span>
            <i class="ti ti-arrow-right"></i>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient(
      'https://bafpnqleaivhlbtbvufg.supabase.co',
      'sb_publishable_dyg3P9bHZkwRn7_bErLySw_lGPgdGfc'
    )

    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector("i");
      input.type = input.type === "password" ? "text" : "password";
      icon.className = input.type === "password" ? "ti ti-eye" : "ti ti-eye-off";
    }
    window.togglePass = togglePass;

    function checkStrength(val) {
      const fill = document.getElementById("strength-fill");
      const label = document.getElementById("strength-label");
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: "0%", bg: "transparent", text: "" },
        { w: "25%", bg: "#ef4444", text: "Weak" },
        { w: "50%", bg: "#f97316", text: "Fair" },
        { w: "75%", bg: "#eab308", text: "Good" },
        { w: "100%", bg: "#22c55e", text: "Strong" },
      ];
      const level = val.length === 0 ? levels[0] : levels[score] || levels[1];
      fill.style.width = level.w;
      fill.style.background = level.bg;
      label.textContent = level.text;
      label.style.color = level.bg;
    }
    window.checkStrength = checkStrength;

    async function handleReset() {
      const password = document.getElementById("new-password").value;
      const confirm  = document.getElementById("confirm-password").value;
      const errorEl  = document.getElementById("reset-error");
      errorEl.innerHTML = "";

      if (!password || password.length < 6) {
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> Password must be at least 6 characters';
        return;
      }
      if (password !== confirm) {
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> Both passwords do not match';
        return;
      }

      const btn = document.querySelector(".submit-btn");
      btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Updating...';
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        btn.innerHTML = '<span>Update password</span> <i class="ti ti-arrow-right"></i>';
        btn.disabled = false;
        errorEl.innerHTML = '<i class="ti ti-alert-circle"></i> ' + error.message;
        return;
      }

      document.getElementById("reset-panel").innerHTML = `
        <div class="success-state">
          <div class="success-icon"><i class="ti ti-check"></i></div>
          <h2 class="success-title">Password updated! ✅</h2>
          <p class="success-sub">You can now sign in with your new password.</p>
          <a href="login.html" class="submit-btn" style="text-decoration:none;justify-content:center;display:flex">
            Sign in <i class="ti ti-arrow-right"></i>
          </a>
        </div>
      `;
    }
    window.handleReset = handleReset;
  </script>
  <script src="cursor-trail.js"></script>
</body>
</html>
